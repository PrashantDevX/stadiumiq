<!DOCTYPE html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0b5d3b" />
    <meta
      name="description"
      content="StadiumIQ — a GenAI match-day assistant for the FIFA World Cup 2026: navigation, crowd, accessibility, transport, sustainability and real-time help."
    />
    <title>StadiumIQ — Smart Stadium Assistant</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23ffffff' stroke='%230b3d26' stroke-width='3'/%3E%3Cpath d='M32 14 l10 7 -4 12 h-12 l-4 -12 z' fill='%230b3d26'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#chat-input">Skip to chat</a>

    <header class="app-header">
      <!-- Decorative football-pitch doodle band (purely cosmetic, hidden from AT). -->
      <svg class="pitch-doodle" viewBox="0 0 1200 80" preserveAspectRatio="none" aria-hidden="true" focusable="false">
        <defs>
          <pattern id="stripes" width="120" height="80" patternUnits="userSpaceOnUse">
            <rect width="60" height="80" fill="rgba(255,255,255,0.05)" />
          </pattern>
        </defs>
        <rect width="1200" height="80" fill="url(#stripes)" />
        <circle cx="600" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
        <line x1="600" y1="0" x2="600" y2="80" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
        <rect x="0" y="18" width="46" height="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
        <rect x="1154" y="18" width="46" height="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
      </svg>

      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <!-- Stylised soccer ball logo built from SVG (no external image). -->
          <svg viewBox="0 0 64 64" width="46" height="46" role="img" aria-label="StadiumIQ logo">
            <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#0b3d26" stroke-width="2.5" />
            <path d="M32 14 l10 7 -4 12 h-12 l-4 -12 z" fill="#0b3d26" />
            <path d="M32 14 v-1 M42 21 l6 -3 M38 33 l7 4 M26 33 l-7 4 M22 21 l-6 -3" stroke="#0b3d26" stroke-width="2.2" fill="none" stroke-linecap="round" />
            <circle cx="32" cy="32" r="30" fill="none" stroke="#0b3d26" stroke-width="1" opacity="0.4" />
          </svg>
        </span>
        <div>
          <h1>StadiumIQ</h1>
          <p class="tagline">Your FIFA World Cup 2026 match-day assistant</p>
        </div>
      </div>

      <div class="context-bar" role="group" aria-label="Assistant settings">
        <label class="field">
          <span>I am a</span>
          <select id="role-select" aria-label="Your role"></select>
        </label>
        <label class="field">
          <span>Venue</span>
          <select id="venue-select" aria-label="Stadium"></select>
        </label>
        <label class="field">
          <span>Language</span>
          <select id="language-select" aria-label="Language"></select>
        </label>
        <label class="field checkbox">
          <input type="checkbox" id="mobility-toggle" />
          <span>Step-free routes</span>
        </label>
      </div>

      <div class="a11y-bar" role="group" aria-label="Accessibility controls">
        <button type="button" id="contrast-toggle" class="pill" aria-pressed="false">
          High contrast
        </button>
        <button type="button" id="text-size-toggle" class="pill" aria-pressed="false">
          Larger text
        </button>
        <span id="ai-mode" class="mode-badge" aria-live="polite"></span>
      </div>
    </header>

    <main class="app-main">
      <section
        id="chat-log"
        class="chat-log"
        aria-live="polite"
        aria-label="Conversation"
        role="log"
      ></section>

      <div id="suggestions" class="suggestions" aria-label="Suggested questions" role="group"></div>

      <form id="chat-form" class="chat-form" autocomplete="off">
        <label class="visually-hidden" for="chat-input">Ask StadiumIQ a question</label>
        <textarea
          id="chat-input"
          name="message"
          rows="1"
          placeholder="Ask about gates, transport, accessibility, food…"
          aria-describedby="input-hint"
          required
        ></textarea>
        <button type="submit" id="send-btn" class="send-btn">
          <span class="visually-hidden">Send message</span>
          <span aria-hidden="true">Send ➤</span>
        </button>
        <p id="input-hint" class="visually-hidden">
          Press Enter to send, Shift plus Enter for a new line.
        </p>
      </form>
    </main>

    <footer class="app-footer">
      <p>
        StadiumIQ is a hackathon demo. Stadium operational details are illustrative. For
        emergencies, always contact venue stewards or local emergency services.
      </p>
    </footer>

    <script src="app.js" type="module"></script>
  </body>
</html>
